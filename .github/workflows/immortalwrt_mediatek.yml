name: immortalwrt_mediatek

on:
  schedule:
    - cron: 0 16 * * *
  workflow_dispatch:

permissions:
  actions: write
  contents: write

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  CONFIG_FILE: immortalwrt/mediatek/defconfig
  DIY_P1_SH: immortalwrt/diy-part1.sh
  DIY_P2_SH: immortalwrt/diy-part2.sh
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  OPENWRT_NAME: immortalwrt
  OPENWRT_DEVICE: mediatek

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Maximize build space
      uses: easimon/maximize-build-space@v10
      with:
        root-reserve-mb: 512
        swap-size-mb: 1024
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        
    - name: Check out the project branch
      uses: actions/checkout@v6.0.2       
 
    - name: Initialize the compilation environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        ( sudo -E apt-get -qq update
        sudo -E apt-get -qq install build-essential clang flex g++ gawk gcc-multilib gettext \
        git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev swig libpython3-dev aria2 jq subversion qemu-utils ccache rename libelf-dev
        sudo -E apt-get -qq purge azure-cli ghc* zulu* hhvm llvm* firefox powershell openjdk* dotnet* google* mysql* php* android* rename speedtest-cli
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean ) &
        sudo timedatectl set-timezone "$TZ"
        
    - name: Initialize Environment and Display System Info
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        chmod +x $OPENWRT_NAME/*.sh
        $GITHUB_WORKSPACE/$OPENWRT_NAME/system-Information.sh
        
    - name: Download firmware source code
      run: |
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
        cd openwrt
        git log --pretty=tformat:"%h" -n1 tools toolchain || echo "No toolchain history"

    - name: Generate cache keys
      id: cache-key
      run: |
        echo "ccache_period=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

    - name: Restore toolchain cache
      uses: klever1988/cachewrtbuild@54ed4fe2f7d8b5cfbc0b928c159266ee892c2d3d
      with:
        ccache: 'false'
        prefix: ${{ github.workspace }}/openwrt
        mixkey: ${{ env.OPENWRT_NAME }}-${{ env.OPENWRT_DEVICE }}-${{ env.REPO_BRANCH }}

    - name: Restore ccache
      id: ccache-restore
      uses: actions/cache/restore@v5.0.5
      with:
        path: openwrt/.ccache
        key: ccache-${{ env.OPENWRT_NAME }}-${{ env.OPENWRT_DEVICE }}-${{ env.REPO_BRANCH }}-${{ steps.cache-key.outputs.ccache_period }}
        restore-keys: |
          ccache-${{ env.OPENWRT_NAME }}-${{ env.OPENWRT_DEVICE }}-${{ env.REPO_BRANCH }}-

    - name: Update base feed indexes
      working-directory: ./openwrt
      run: |
        ./scripts/feeds update -a
        
    - name: Load feeds.conf.default
      run: |
        chmod +x $OPENWRT_NAME/*.sh
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Load config
      run: |
        [ -e "$CONFIG_FILE" ] && cat "$CONFIG_FILE" > openwrt/.config
        chmod +x $OPENWRT_NAME/*.sh && cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: Download the installation package
      id: package
      run: |
        cd openwrt
        make defconfig
        cat .config
        make download -j$(nproc)
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;
             
    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j$(($(nproc)/2 + 1)) || make -j1 V=s
        echo "date1=$(date +'%Y.%m.%d')" >> $GITHUB_ENV
        echo "date2=$(date "+%Y年%m月%d日")" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Save ccache
      if: steps.compile.outputs.status == 'success' && steps.ccache-restore.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5.0.5
      with:
        path: openwrt/.ccache
        key: ${{ steps.ccache-restore.outputs.cache-primary-key }}

    - name: Prune old caches
      if: steps.compile.outputs.status == 'success' && !cancelled()
      continue-on-error: true
      uses: actions/github-script@v8
      env:
        CACHE_SCOPE: ${{ env.OPENWRT_NAME }}-${{ env.OPENWRT_DEVICE }}-${{ env.REPO_BRANCH }}
        CCACHE_PREFIX: ccache-${{ env.OPENWRT_NAME }}-${{ env.OPENWRT_DEVICE }}-${{ env.REPO_BRANCH }}-
        TOOLCHAIN_PREFIX: ${{ env.OPENWRT_NAME }}-${{ env.OPENWRT_DEVICE }}-${{ env.REPO_BRANCH }}-cache-openwrt-
        CURRENT_CCACHE_KEY: ${{ steps.ccache-restore.outputs.cache-matched-key || steps.ccache-restore.outputs.cache-primary-key }}
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const owner = context.repo.owner;
          const repo = context.repo.repo;
          const scope = process.env.CACHE_SCOPE;
          const ccachePrefix = process.env.CCACHE_PREFIX;
          const toolchainPrefix = process.env.TOOLCHAIN_PREFIX;
          const currentCcacheKey = process.env.CURRENT_CCACHE_KEY;

          const caches = [];
          for (let page = 1; ; page += 1) {
            const response = await github.request('GET /repos/{owner}/{repo}/actions/caches', {
              owner,
              repo,
              per_page: 100,
              page,
            });

            const pageCaches = response.data.actions_caches || [];
            caches.push(...pageCaches);
            if (pageCaches.length < 100) {
              break;
            }
          }

          const byNewest = (left, right) => {
            const leftTime = new Date(left.last_accessed_at || left.created_at || 0).getTime();
            const rightTime = new Date(right.last_accessed_at || right.created_at || 0).getTime();
            return rightTime - leftTime;
          };

          const ccacheCaches = caches
            .filter((cache) => (cache.key || '').startsWith(ccachePrefix))
            .sort(byNewest);
          const staleCcacheCaches = ccacheCaches.filter((cache) => cache.key !== currentCcacheKey);

          const toolchainCaches = caches
            .filter((cache) => {
              const key = cache.key || '';
              return key.startsWith(toolchainPrefix);
            })
            .sort(byNewest);
          const staleToolchainCaches = toolchainCaches.slice(1);

          const staleCaches = [...staleCcacheCaches, ...staleToolchainCaches];
          if (staleCaches.length === 0) {
            core.info(
              `No stale caches to delete for prefixes: ${ccachePrefix} , ${toolchainPrefix}`
            );
            return;
          }

          const deletedPrefixes = [...new Set(
            staleCaches.map((cache) => {
              const key = cache.key || '';
              if (key.startsWith(ccachePrefix)) {
                return ccachePrefix;
              }
              if (key.startsWith(toolchainPrefix)) {
                return toolchainPrefix;
              }
              return `unmatched:${scope}`;
            })
          )];

          core.info(`Deleting stale caches for key prefixes: ${deletedPrefixes.join(', ')}`);

          for (const cache of staleCaches) {
            const prefix = (cache.key || '').startsWith(ccachePrefix) ? ccachePrefix : toolchainPrefix;
            core.info(`Deleting cache with prefix ${prefix}: ${cache.key} (${cache.id})`);
            await github.request('DELETE /repos/{owner}/{repo}/actions/caches/{cache_id}', {
              owner,
              repo,
              cache_id: cache.id,
            });
          }

          core.info(
            `Deleted ${staleCaches.length} stale cache(s). ` +
            `Kept ccache key: ${currentCcacheKey || 'none'}. ` +
            `Kept toolchain cache count: ${toolchainCaches.length > 0 ? 1 : 0}. ` +
            `Tracked prefixes: ${ccachePrefix}, ${toolchainPrefix}.`
          );

    - name: Organize and Rename Files
      id: organize
      if: ${{ steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true' && !cancelled() }}
      run: |
        cd openwrt/bin/targets/mediatek/filogic
        rm -rf packages *mt798* *.config *.buildinfo *.json sha256sums 
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT
        
    - name: Upload the firmware to github
      uses: actions/upload-artifact@v7.0.1
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: ${{ env.date1 }}_${{ env.OPENWRT_NAME }}_${{ env.OPENWRT_DEVICE }}_${{ env.REPO_BRANCH }}
        path: ${{ env.FIRMWARE }}

    - name: Generate release tags
      id: tag
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=${{ env.date1 }}-${{ env.OPENWRT_NAME }}_${{ env.REPO_BRANCH }}" >> $GITHUB_OUTPUT
        touch release.txt
        echo "📥 固件下载" >> release.txt
        echo "status=success" >> $GITHUB_OUTPUT
        
    - name: Publish to release
      uses: softprops/action-gh-release@v2
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        files: ${{ env.FIRMWARE }}/*
        name: ${{ steps.tag.outputs.release_tag }}
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
    
    - name: 删除旧的Releases
      if: steps.tag.outputs.status == 'success' && !cancelled()
      uses: MedyMa/delete-older-releases@v0.3.4

      with:
        keep_latest: 30
        delete_tags: true
        delete_tag_pattern: '^.*-immortalwrt_openwrt-24\.10$'
      env:
        GITHUB_TOKEN: ${{ secrets.RELEASES_TOKEN }}
